server:
  port: ${EXHIBITION_SERVICE_PORT:9004}

spring:
  application:
    name: EXHIBITION-SERVICE

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${EXHIBITION_DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  sql:
    init:
      mode: always
      platform: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true

springdoc:
  api-docs:
    enabled: true
  packages-to-scan: com.exhibition.exhibition_service.controller

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:9001/eureka}
