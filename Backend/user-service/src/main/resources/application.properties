server.port=${USER_SERVICE_SERVER_PORT:8080}

spring.application.name=user-service

spring.datasource.url=${USER_DB_URL:jdbc:postgresql://localhost:5432/users_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false

app.jwt.issuer=${APP_JWT_ISSUER:http://localhost:8090}
app.jwt.access-token-ttl=${APP_JWT_ACCESS_TOKEN_TTL:PT1H}
app.jwt.refresh-token-ttl=${APP_JWT_REFRESH_TOKEN_TTL:P7D}

app.oauth2.client-id=${APP_OAUTH2_CLIENT_ID:user-service-client}
app.oauth2.client-secret=${APP_OAUTH2_CLIENT_SECRET:user-service-secret}
app.oauth2.redirect-uris=${APP_OAUTH2_REDIRECT_URIS:http://localhost:8081/login/oauth2/code/user-service-client}
app.oauth2.post-logout-redirect-uris=${APP_OAUTH2_POST_LOGOUT_URIS:http://localhost:8081/}
app.oauth2.frontend-success-url=${APP_OAUTH2_FRONTEND_SUCCESS_URL:http://localhost:5173/oauth2/callback}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:change-me}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:change-me}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:change-me}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:change-me}
spring.security.oauth2.client.registration.github.scope=user:email
spring.security.oauth2.client.registration.github.client-name=GitHub
spring.security.oauth2.client.provider.github.authorization-uri=https://github.com/login/oauth/authorize
spring.security.oauth2.client.provider.github.token-uri=https://github.com/login/oauth/access_token
spring.security.oauth2.client.provider.github.user-info-uri=https://api.github.com/user
spring.security.oauth2.client.provider.github.user-name-attribute=login

# Proxy configuration (for networks behind proxy)
http.proxy.host=${HTTP_PROXY_HOST:}
http.proxy.port=${HTTP_PROXY_PORT:}
http.non.proxy.hosts=${HTTP_NON_PROXY_HOSTS:localhost|127.*|[::1]}

#logging.level.org.springframework.security=INFO

logging.level.org.springframework.security=DEBUG
logging.level.com.user.userservice.security=DEBUG
