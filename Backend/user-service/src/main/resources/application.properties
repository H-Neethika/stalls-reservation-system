server.port=${USER_SERVICE_SERVER_PORT:8080}

spring.application.name=user-service

spring.datasource.url=${USER_DB_URL:jdbc:postgresql://localhost:5432/users_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false

app.jwt.issuer=${APP_JWT_ISSUER:http://localhost:8090}
app.jwt.access-token-ttl=${APP_JWT_ACCESS_TOKEN_TTL:PT1H}
app.jwt.refresh-token-ttl=${APP_JWT_REFRESH_TOKEN_TTL:P7D}

logging.level.org.springframework.security=INFO
