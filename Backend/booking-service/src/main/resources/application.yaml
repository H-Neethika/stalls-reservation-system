server:
  port: ${BOOKING_SERVICE_PORT:9003}

spring:
  application:
    name: BOOKING-SERVICE
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${APP_JWT_ISSUER:http://localhost:9002}

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${BOOKING_DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: never

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${BOOKING_PAYMENT_SUCCESS_GROUP:booking-payment-success}
      auto-offset-reset: earliest

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:9001/eureka}

app:
  kafka:
    topics:
      payment-success: ${PAYMENT_SUCCESS_TOPIC:payment.success}
      reservation-booked: ${RESERVATION_BOOKED_TOPIC:reservation.booked}
      stall-status-update: ${STALL_STATUS_UPDATE_TOPIC:stall.status.update}
  notification:
    default-event-link: ${DEFAULT_EVENT_LINK:https://example.com/events}
    default-fair-name: ${DEFAULT_FAIR_NAME:Stall Reservation}
