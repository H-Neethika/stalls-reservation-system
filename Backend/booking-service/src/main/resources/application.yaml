server:
  port: 8082

spring:
  application:
    name: booking-service

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${BOOKING_DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always
      platform: postgres
      data-locations:
        - classpath:data.sql
        - classpath:hallA_stalls.sql
        - classpath:hallB_stalls.sql
        - classpath:hallCDFG_stalls.sql
        - classpath:hallKJR_stalls.sql
        - classpath:hallHH1_stalls.sql
        - classpath:hallLMNPQ_stalls.sql
