server:
  port: ${NOTIFICATION_SERVICE_PORT:9006}

spring:
  application:
    name: NOTIFICATION-SERVICE

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${NOTIFICATION_DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${NOTIFICATION_EMAIL}
    password: ${NOTIFICATION_EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${NOTIFICATION_RESERVATION_GROUP:notification-reservation}
      auto-offset-reset: earliest

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:9001/eureka}

app:
  kafka:
    topics:
      reservation-booked: ${RESERVATION_BOOKED_TOPIC:reservation.booked}
